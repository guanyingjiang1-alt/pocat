<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>啵！狂戳朋友的嘴</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1a1a1a;
    --paper:#ffe65c;
    --pink:#ff3d7f;
    --cyan:#1fb8a3;
    --orange:#ff7a30;
    --white:#fff8e8;
    --shadow: 5px 5px 0 var(--ink);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background-color:var(--paper);
    background-image:
      radial-gradient(var(--ink) 1.1px, transparent 1.1px);
    background-size: 18px 18px;
    background-position: -9px -9px;
    font-family:'Space Grotesk', sans-serif;
    color:var(--ink);
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 32px 16px 64px;
  }
  .eyebrow{
    font-family:'Space Mono', monospace;
    font-size:13px;
    letter-spacing:.18em;
    text-transform:uppercase;
    background:var(--ink);
    color:var(--paper);
    padding:5px 12px;
    transform:rotate(-2deg);
    margin-bottom:14px;
  }
  h1{
    font-family:'Bungee', system-ui;
    font-size:clamp(48px, 13vw, 96px);
    line-height:.9;
    margin:0 0 6px;
    color:var(--ink);
    -webkit-text-stroke: 0;
    text-shadow:
      3px 3px 0 var(--pink),
      6px 6px 0 var(--ink);
    transform: rotate(-1.5deg);
  }
  .tagline{
    font-size:16px;
    font-weight:500;
    max-width:380px;
    text-align:center;
    margin: 0 0 28px;
  }
  .tagline b{ color:var(--pink); }

  .stage{
    position:relative;
    width: min(78vw, 320px);
    margin-bottom: 18px;
    user-select:none;
    -webkit-user-select:none;
    touch-action: manipulation;
  }
  .face-btn{
    all:unset;
    display:block;
    width:100%;
    cursor:pointer;
    position:relative;
    border-radius: 14px;
    overflow:hidden;
    border:4px solid var(--ink);
    box-shadow: var(--shadow);
    background:var(--white);
    transition: transform .08s ease;
  }
  .face-btn:active{ transform: translate(2px,2px); box-shadow: 3px 3px 0 var(--ink); }
  .face-btn:focus-visible{ outline:4px solid var(--cyan); outline-offset:3px; }
  .face-btn img{
    display:block;
    width:100%;
    height:auto;
    pointer-events:none;
  }
  .face-btn img.open{ display:none; }
  .face-btn.is-open img.closed{ display:none; }
  .face-btn.is-open img.open{ display:block; }
  .face-btn.is-open{ transform: scale(1.035); }

  .burst{
    position:absolute;
    pointer-events:none;
    font-family:'Bungee', system-ui;
    font-size:22px;
    color:var(--orange);
    -webkit-text-stroke: 1.5px var(--ink);
    text-shadow: 2px 2px 0 var(--ink);
    animation: burstUp .65s ease-out forwards;
    z-index:5;
  }
  @keyframes burstUp{
    0%{ opacity:1; transform: translate(0,0) rotate(var(--rot,0deg)) scale(.6); }
    25%{ opacity:1; transform: translate(0,-10px) rotate(var(--rot,0deg)) scale(1.15); }
    100%{ opacity:0; transform: translate(var(--dx,0px),-70px) rotate(var(--rot,0deg)) scale(1); }
  }

  .hint{
    font-family:'Space Mono', monospace;
    font-size:12px;
    opacity:.65;
    margin-bottom:26px;
  }

  .panel{
    width: min(90vw, 380px);
    background:var(--white);
    border:4px solid var(--ink);
    box-shadow: var(--shadow);
    border-radius:14px;
    padding:18px 20px;
    margin-bottom:20px;
  }
  .counter-panel{
    text-align:center;
    background:var(--ink);
    color:var(--paper);
  }
  .counter-label{
    font-family:'Space Mono', monospace;
    font-size:12px;
    letter-spacing:.16em;
    text-transform:uppercase;
    opacity:.85;
  }
  .counter-num{
    font-family:'Space Mono', monospace;
    font-weight:700;
    font-size:clamp(36px,9vw,52px);
    color:var(--pink);
    letter-spacing:.02em;
  }

  .panel h2{
    font-family:'Bungee', system-ui;
    font-size:18px;
    margin:0 0 12px;
    color:var(--pink);
  }
  .nick-row{
    display:flex;
    gap:8px;
    margin-bottom:14px;
  }
  .nick-row input{
    flex:1;
    min-width:0;
    font-family:'Space Grotesk', sans-serif;
    font-size:14px;
    padding:9px 10px;
    border:3px solid var(--ink);
    border-radius:8px;
    background:#fff;
  }
  .nick-row input:focus-visible{ outline:3px solid var(--cyan); outline-offset:2px; }

  .leaderboard{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px; }
  .leaderboard li{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:14px;
    padding:8px 10px;
    border:2px solid var(--ink);
    border-radius:8px;
    background:#fff;
  }
  .leaderboard li.me{ background: #fff1d6; }
  .rank{
    font-family:'Bungee', system-ui;
    font-size:13px;
    width:26px; height:26px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    color:var(--white);
    background:var(--ink);
    flex-shrink:0;
  }
  .leaderboard li:nth-child(1) .rank{ background:var(--pink); }
  .leaderboard li:nth-child(2) .rank{ background:var(--orange); }
  .leaderboard li:nth-child(3) .rank{ background:var(--cyan); }
  .lb-name{ flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:500; }
  .lb-count{ font-family:'Space Mono', monospace; font-weight:700; }
  .empty-row{ font-size:13px; opacity:.6; text-align:center; padding:10px 0; }

  .actions{
    display:flex;
    gap:10px;
    width: min(90vw, 380px);
  }
  .btn{
    flex:1;
    font-family:'Space Grotesk', sans-serif;
    font-weight:700;
    font-size:14px;
    padding:12px 14px;
    border:3px solid var(--ink);
    border-radius:10px;
    background:var(--cyan);
    color:var(--ink);
    cursor:pointer;
    box-shadow: 4px 4px 0 var(--ink);
    transition: transform .08s ease;
  }
  .btn:active{ transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--ink); }
  .btn:focus-visible{ outline:3px solid var(--pink); outline-offset:2px; }
  .btn.ghost{ background:var(--white); }

  .toast{
    position:fixed;
    bottom:22px;
    left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--ink);
    color:var(--paper);
    font-family:'Space Mono', monospace;
    font-size:13px;
    padding:10px 18px;
    border-radius:30px;
    opacity:0;
    transition: opacity .25s ease, transform .25s ease;
    pointer-events:none;
    z-index:50;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  footer{
    margin-top:8px;
    font-family:'Space Mono', monospace;
    font-size:11px;
    opacity:.55;
    text-align:center;
  }

  @media (prefers-reduced-motion: reduce){
    .face-btn{ transition:none; }
    .face-btn.is-open{ transform:none; }
    .burst{ animation:none; opacity:0; }
  }
</style>
</head>

  <div class="panel counter-panel">

  </div>

  <div class="panel">
    <h2>排行榜</h2>
    <div class="nick-row">
      <input id="nickInput" type="text" maxlength="14" placeholder="你的暱稱（選填）" value="">
    </div>
    <ul class="leaderboard" id="leaderboard">
      <li class="empty-row">還沒有人上榜，戳一下搶頭香！</li>
    </ul>
  </div>

  <div class="actions">
    <button class="btn ghost" id="muteBtn">🔊 音效</button>
    <button class="btn" id="shareBtn">🔗 複製連結</button>
  </div>

  <div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  var STORAGE_KEY = "pocat:gamedata";
  var faceBtn = document.getElementById('faceBtn');
  var totalNum = document.getElementById('totalNum');
  var leaderboardEl = document.getElementById('leaderboard');
  var nickInput = document.getElementById('nickInput');
  var muteBtn = document.getElementById('muteBtn');
  var shareBtn = document.getElementById('shareBtn');
  var toastEl = document.getElementById('toast');

  var muted = false;
  var audioCtx = null;
  var pendingLocal = 0;          // clicks not yet flushed to shared storage
  var remoteTotal = 0;           // last known shared total
  var remoteLeaderboard = {};    // last known shared leaderboard {name: count}
  var nickname = "";
  var storageOK = !!(window.storage && typeof window.storage.get === 'function');
  var flushTimer = null;
  var pollTimer = null;

  function randId(){ return Math.random().toString(36).slice(2,6); }
  var defaultNick = "神秘訪客#" + randId();
  nickInput.placeholder = "你的暱稱（預設：" + defaultNick + "）";

  function currentName(){
    var v = nickInput.value.trim();
    return v.length ? v.slice(0,14) : defaultNick;
  }

  // ---------- sound ----------
  function playPop(){
    if(muted) return;
    try{
      audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
      var t = audioCtx.currentTime;
      var osc = audioCtx.createOscillator();
      var gain = audioCtx.createGain();
      var f0 = 170 * (0.92 + Math.random()*0.22);
      osc.type = 'sine';
      osc.frequency.setValueAtTime(f0, t);
      osc.frequency.exponentialRampToValueAtTime(f0*0.35, t+0.09);
      gain.gain.setValueAtTime(0.0001, t);
      gain.gain.exponentialRampToValueAtTime(0.55, t+0.012);
      gain.gain.exponentialRampToValueAtTime(0.0001, t+0.13);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t+0.14);
    }catch(e){ /* audio not available, ignore */ }
  }

  muteBtn.addEventListener('click', function(){
    muted = !muted;
    muteBtn.textContent = muted ? "🔇 音效" : "🔊 音效";
  });

  // ---------- burst fx ----------
  var bursts = ["啵!","POP!","砰!","啾!"];
  function spawnBurst(){
    var span = document.createElement('span');
    span.className = 'burst';
    span.textContent = bursts[Math.floor(Math.random()*bursts.length)];
    var leftPct = 20 + Math.random()*60;
    var rot = (Math.random()*40 - 20);
    var dx = (Math.random()*60 - 30);
    span.style.left = leftPct + '%';
    span.style.top = (10 + Math.random()*20) + '%';
    span.style.setProperty('--rot', rot + 'deg');
    span.style.setProperty('--dx', dx + 'px');
    var colors = ['#ff3d7f','#ff7a30','#1fb8a3'];
    span.style.color = colors[Math.floor(Math.random()*colors.length)];
    document.querySelector('.stage').appendChild(span);
    setTimeout(function(){ span.remove(); }, 700);
  }

  // ---------- counting / storage ----------
  function renderTotal(){
    totalNum.textContent = (remoteTotal + pendingLocal).toLocaleString('en-US');
  }

  function renderLeaderboard(){
    var entries = Object.keys(remoteLeaderboard).map(function(k){
      return { name:k, count:remoteLeaderboard[k] };
    });
    // fold in not-yet-flushed local clicks under current name for live feedback
    if(pendingLocal > 0){
      var me = currentName();
      var found = entries.find(function(e){ return e.name === me; });
      if(found){ found.count += pendingLocal; }
      else{ entries.push({ name: me, count: pendingLocal }); }
    }
    entries.sort(function(a,b){ return b.count - a.count; });
    entries = entries.slice(0,8);
    leaderboardEl.innerHTML = '';
    if(entries.length === 0){
      var li = document.createElement('li');
      li.className = 'empty-row';
      li.textContent = '還沒有人上榜，戳一下搶頭香！';
      leaderboardEl.appendChild(li);
      return;
    }
    entries.forEach(function(e, i){
      var li = document.createElement('li');
      if(e.name === currentName()) li.className = 'me';
      var rank = document.createElement('span');
      rank.className = 'rank';
      rank.textContent = (i+1);
      var name = document.createElement('span');
      name.className = 'lb-name';
      name.textContent = e.name;
      var count = document.createElement('span');
      count.className = 'lb-count';
      count.textContent = e.count.toLocaleString('en-US');
      li.appendChild(rank); li.appendChild(name); li.appendChild(count);
      leaderboardEl.appendChild(li);
    });
  }

  function loadShared(){
    if(!storageOK){ renderTotal(); renderLeaderboard(); return; }
    window.storage.get(STORAGE_KEY, true).then(function(res){
      if(res && res.value){
        try{
          var data = JSON.parse(res.value);
          remoteTotal = data.totalClicks || 0;
          remoteLeaderboard = data.leaderboard || {};
        }catch(e){}
      }
      renderTotal(); renderLeaderboard();
    }).catch(function(){
      remoteTotal = remoteTotal || 0;
      renderTotal(); renderLeaderboard();
    });
  }

  function flush(){
    if(!storageOK || pendingLocal <= 0) return;
    var toFlush = pendingLocal;
    var name = currentName();
    pendingLocal = 0;
    window.storage.get(STORAGE_KEY, true).then(function(res){
      var data = { totalClicks:0, leaderboard:{} };
      if(res && res.value){
        try{ data = JSON.parse(res.value); }catch(e){}
        if(!data.leaderboard) data.leaderboard = {};
        if(!data.totalClicks) data.totalClicks = 0;
      }
      data.totalClicks = (data.totalClicks||0) + toFlush;
      data.leaderboard[name] = (data.leaderboard[name]||0) + toFlush;
      return window.storage.set(STORAGE_KEY, JSON.stringify(data), true).then(function(){
        remoteTotal = data.totalClicks;
        remoteLeaderboard = data.leaderboard;
        renderTotal(); renderLeaderboard();
      });
    }).catch(function(){
      // write failed; put the clicks back so we retry later
      pendingLocal += toFlush;
    });
  }

  function scheduleFlush(){
    if(flushTimer) clearTimeout(flushTimer);
    flushTimer = setTimeout(flush, 1200);
    if(pendingLocal >= 20) flush();
  }

  // ---------- click handling ----------
  var openTimer = null;
  function pop(){
    faceBtn.classList.add('is-open');
    clearTimeout(openTimer);
    openTimer = setTimeout(function(){ faceBtn.classList.remove('is-open'); }, 140);
    playPop();
    spawnBurst();
    pendingLocal += 1;
    renderTotal();
    renderLeaderboard();
    scheduleFlush();
  }

  faceBtn.addEventListener('click', function(e){
    e.preventDefault();
    pop();
  });
  faceBtn.addEventListener('keydown', function(e){
    if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); pop(); }
  });

  nickInput.addEventListener('input', renderLeaderboard);

  // ---------- share ----------
  function showToast(msg){
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(function(){ toastEl.classList.remove('show'); }, 1800);
  }

  shareBtn.addEventListener('click', function(){
    var url = location.href;
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(url).then(function(){
        showToast('已複製連結，傳給朋友惡整吧！');
      }).catch(function(){
        showToast(url);
      });
    }else{
      showToast(url);
    }
  });

  // ---------- lifecycle ----------
  document.addEventListener('visibilitychange', function(){
    if(document.visibilityState === 'hidden') flush();
  });
  window.addEventListener('pagehide', flush);

  loadShared();
  pollTimer = setInterval(loadShared, 6000);

})();
</script>
</body>
</html>
